name: Build Marble Kernel (KSU Next + SUSFS)

on:
  workflow_dispatch:
    inputs:
      KSU_NEXT_TAG:
        description: 'KSU Next tag/branch'
        required: false
        default: 'next'
      SUSFS_BRANCH:
        description: 'SUSFS branch for kernel 5.10'
        required: false
        default: 'kernel-5.10'

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      ARCH: arm64
      SUBARCH: arm64
      KERNEL_SOURCE: https://github.com/MiCode/Xiaomi_Kernel_OpenSource
      KERNEL_BRANCH: marble-s-oss
      ANYKERNEL_URL: https://github.com/osm0sis/AnyKernel3

    steps:
      - name: Install dependencies + Clang 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio curl \
            flex git kmod libelf-dev libssl-dev \
            lz4 python3 unzip wget zip zstd \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            clang lld llvm

          clang --version
          echo "Clang ready"

      - name: Clone kernel source
        run: |
          git clone --depth=1 \
            -b ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_SOURCE }} \
            kernel
          echo "KERNEL_DIR=$GITHUB_WORKSPACE/kernel" >> $GITHUB_ENV

      - name: Integrate KernelSU Next
        run: |
          cd $GITHUB_WORKSPACE/kernel
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | \
            bash -s "${{ github.event.inputs.KSU_NEXT_TAG }}"

      - name: Apply SUSFS patches
        run: |
          cd $GITHUB_WORKSPACE
          git clone --depth=1 \
            -b ${{ github.event.inputs.SUSFS_BRANCH }} \
            https://github.com/sidex15/susfs4ksu \
            susfs

          cd $GITHUB_WORKSPACE/kernel

          cp ../susfs/kernel_patches/fs/susfs.c           fs/
          cp ../susfs/kernel_patches/include/linux/susfs.h include/linux/
          cp ../susfs/kernel_patches/fs/sus_su.c           fs/  || true
          cp ../susfs/kernel_patches/include/linux/sus_su.h include/linux/ || true

          PATCH_FILE="../susfs/kernel_patches/50_add_susfs_in_gki-${{ github.event.inputs.SUSFS_BRANCH }}.patch"
          if [ -f "$PATCH_FILE" ]; then
            patch -p1 < "$PATCH_FILE" || echo "Patch applied with offsets"
          else
            echo "Looking for any available patch..."
            ls ../susfs/kernel_patches/*.patch || true
            for p in ../susfs/kernel_patches/*.patch; do
              patch -p1 < "$p" && break || true
            done
          fi

      - name: Enable SUSFS in defconfig
        run: |
          cd $GITHUB_WORKSPACE/kernel
          DEFCONFIG="arch/arm64/configs/vendor/marble_defconfig"
          cat >> "$DEFCONFIG" << 'EOF'

          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_SU=n
          EOF

      - name: Build kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel

          MAKE_FLAGS="
            O=out
            ARCH=arm64
            CC=clang
            LD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            LLVM=1
            LLVM_IAS=1
          "

          make $MAKE_FLAGS vendor/marble_defconfig
          make $MAKE_FLAGS -j$(nproc --all) 2>&1 | tee build.log

          if [ -f "out/arch/arm64/boot/Image" ]; then
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
          else
            echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
            tail -80 build.log
            exit 1
          fi

      - name: Package with AnyKernel3
        if: env.BUILD_SUCCESS == 'true'
        run: |
          git clone --depth=1 ${{ env.ANYKERNEL_URL }} AnyKernel3
          cd AnyKernel3
          cp $GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/Image .
          [ -f "$GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/Image.gz-dtb" ] && \
            cp $GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/Image.gz-dtb . || true
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/device.name1=/device.name1=marble/' anykernel.sh
          ZIP_NAME="Marble-KSU_Next-SUSFS-$(date +%Y%m%d-%H%M).zip"
          zip -r9 "../$ZIP_NAME" . -x ".git/*"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload flashable ZIP
        if: env.BUILD_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Marble-KSU_Next-SUSFS
          path: ${{ env.ZIP_NAME }}
          retention-days: 7

      - name: Upload raw kernel Image
        if: env.BUILD_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kernel-Image
          path: kernel/out/arch/arm64/boot/Image
          retention-days: 7

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel/build.log
          retention-days: 3
